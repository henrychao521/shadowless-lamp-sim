name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy site files to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Inject token for authenticated push
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git

          # Copy site files to temp
          mkdir -p /tmp/site
          cp index.html index.css simulation.js simulation3d.js dev-log.html /tmp/site/
          cp manifest.json icon.svg /tmp/site/
          # Copy docx if it exists (referenced by download link in index.html)
          if [ -f "手術無影燈光學設計與模擬.docx" ]; then
            cp "手術無影燈光學設計與模擬.docx" /tmp/site/
          fi
          touch /tmp/site/.nojekyll

          # Fetch and switch to gh-pages branch
          git fetch origin gh-pages
          git checkout gh-pages

          # Update files
          cp /tmp/site/index.html .
          cp /tmp/site/index.css .
          cp /tmp/site/simulation.js .
          cp /tmp/site/simulation3d.js .
          cp /tmp/site/dev-log.html .
          cp /tmp/site/manifest.json .
          cp /tmp/site/icon.svg .
          cp /tmp/site/.nojekyll .
          if [ -f "/tmp/site/手術無影燈光學設計與模擬.docx" ]; then
            cp "/tmp/site/手術無影燈光學設計與模擬.docx" .
          fi

          git add index.html index.css simulation.js simulation3d.js dev-log.html manifest.json icon.svg .nojekyll
          # Add docx if present (git handles binary files fine)
          git ls-files --error-unmatch "手術無影燈光學設計與模擬.docx" 2>/dev/null && \
            git add "手術無影燈光學設計與模擬.docx" || \
            git add "手術無影燈光學設計與模擬.docx" 2>/dev/null || true

          git diff --staged --quiet && echo "No changes to deploy" || \
            (git commit -m "deploy: sync from main [skip ci]" && git push origin gh-pages)
